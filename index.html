<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Sidetrack — get happily lost in Birmingham's parks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Patrick+Hand&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <div class="brand">
      <h1>Sidetrack</h1>
      <p>your hike, with a plot twist</p>
    </div>
    <nav>
      <button id="tab-map" class="tab on">Map</button>
      <button id="tab-history" class="tab">History</button>
    </nav>
  </header>

  <main id="view-map">
    <div class="toolbar">
      <select id="park-select" aria-label="Choose park">
        <option value="redmountain">Red Mountain Park</option>
        <option value="oakmountain">Oak Mountain State Park</option>
      </select>
      <label class="mode">
        <input type="checkbox" id="mode-toggle" />
        <span>Live GPS</span>
      </label>
      <button id="reset-view" class="btn ghost small">Fit map</button>
    </div>

    <div id="banner" class="banner">Loading…</div>

    <div class="map-wrap">
      <svg id="map" role="img" aria-label="Hand-drawn park map"></svg>
      <div id="hint-box" class="hint-box">
        <p id="hint-text"></p>
        <button id="hint-close" class="btn ghost small">OK</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-bar">
        <button id="suggest-btn" class="btn primary wide">Suggest adventures</button>
      </div>
      <div id="cards"></div>
    </div>
  </main>

  <main id="view-history" style="display:none">
    <div class="panel">
      <p id="taste" class="taste"></p>
      <div id="history-list"></div>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
